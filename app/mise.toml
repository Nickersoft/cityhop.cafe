[env]
_.path = "{{config_root}}/node_modules/.bin"

[tasks]
sync = "svelte-kit sync"

[tasks.dev]
run = "bun run dev"
alias = "dev"

[tasks.build]
run = "bun run build"
alias = "build"

[tasks."ci:install"]
run = "bun install --frozen-lockfile"

[tasks."check:sv"]
depends = ["sync"]
run = "svelte-check --tsconfig ./tsconfig.json --tsgo"

[tasks."check:vp"]
run = "vp check"

[tasks.check]
depends = ["check:sv", "check:vp"]

[tasks.lint]
run = "vp lint --type-aware ."

[tasks."check:sv:watch"]
run = "svelte-check --tsconfig ./tsconfig.json --tsgo"

[tasks.format]
run = "vp fmt ."

[tasks."install:playwright"]
run = "if [ \"${CI:-}\" = \"true\" ]; then bun --bun playwright install --with-deps --only-shell chromium; else bun --bun playwright install --only-shell chromium; fi"

[tasks."test:e2e"]
depends = ["install:playwright"]
run = "bun --bun playwright test e2e/autoplay.spec.ts"

[tasks."test:links"]
depends = ["install:playwright"]
run = "bun --bun playwright test e2e/deadlinks.spec.ts"
alias = "test:links"

[tasks.test]
depends = ["test:e2e"]

[tasks.knip]
run = "knip"
